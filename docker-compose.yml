version: "3.9"

services:

  frontend:
    image: angular-materiels-app
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    image: node:20
    working_dir: /app
    volumes:
      - ./db.json:/app/db.json
    command: npx json-server --watch db.json --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"