# ============================================================
# nginx.conf
# Configuration du serveur nginx qui sert l'application Angular
# et proxyfie les appels API vers le service json-server.
# ============================================================

server {
    listen 80;

    # Répertoire racine des fichiers statiques générés par Angular.
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Route principale — SPA fallback
    # try_files essaie dans l'ordre :
    #   1. le fichier exact ($uri)
    #   2. un répertoire avec index ($uri/)
    #   3. index.html en dernier recours
    # Le point 3 est essentiel pour les Single Page Applications :
    # sans lui, un rechargement sur /dashboard retournerait 404
    # car nginx ne trouverait pas de fichier physique.
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # Proxy API — /api/* → json-server:3000/*
    # Toutes les requêtes commençant par /api/ sont transmises
    # au service json-server sur le réseau interne Docker.
    # "json-server" est résolu par le DNS interne de Docker Compose.
    # Le slash final dans proxy_pass supprime le préfixe /api/
    # avant de transmettre la requête.
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://json-server:3000/;
        proxy_http_version 1.1;
        # Transmet l'en-tête Host d'origine pour que json-server
        # puisse logguer le bon nom d'hôte.
        proxy_set_header Host $host;
    }
}
