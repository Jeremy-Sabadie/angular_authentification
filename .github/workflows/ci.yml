- name: Start stack
  run: docker compose -f docker-compose.ci.yml up -d --build

- name: Wait API
  run: |
    for i in {1..40}; do
      curl -s http://localhost:3000 && echo "API OK" && exit 0
      sleep 2
    done
    echo "API failed"
    exit 1

- name: Run Playwright tests
  run: npx playwright test
