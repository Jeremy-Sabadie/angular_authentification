name: CI

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: [actions/checkout](https://github.com/actions/checkout?utm_source=chatgpt.com)@v4

      - name: Setup Node.js
        uses: [actions/setup-node](https://github.com/actions/setup-node?utm_source=chatgpt.com)@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Start Docker containers
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for API
        run: |
          echo "Waiting API..."

          for i in {1..40}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "API OK"
              exit 0
            fi

            sleep 2
          done

          echo "API failed"

          docker compose -f docker-compose.ci.yml ps
          docker compose -f docker-compose.ci.yml logs

          exit 1

      - name: Wait for frontend
        run: |
          echo "Waiting Front..."

          for i in {1..40}; do
            if curl -s http://localhost:4200 > /dev/null; then
              echo "Frontend OK"
              exit 0
            fi

            sleep 2
          done

          echo "Frontend failed"

          docker compose -f docker-compose.ci.yml logs

          exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: [actions/upload-artifact](https://github.com/actions/upload-artifact?utm_source=chatgpt.com)@v4
        with:
          name: playwright-report
          path: playwright-report/
