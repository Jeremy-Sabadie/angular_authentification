# ============================================================
# .github/workflows/ci.yml
# Pipeline CI GitHub Actions pour ce projet Angular.
#
# DГ©clenchГ© Г  chaque push et pull request sur toutes les branches.
# Lance l'ensemble de la stack Docker (frontend + API mock + tests)
# et exГ©cute les tests E2E Playwright en conteneur isolГ©.
#
# Architecture :
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ  GitHub Actions Runner (ubuntu-latest)       в”Ӯ
#   в”Ӯ                                              в”Ӯ
#   в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ
#   в”Ӯ  в”Ӯjson-serverв”Ӯ  в”Ӯ frontend в”Ӯ  в”Ӯ  tests   в”Ӯ  в”Ӯ
#   в”Ӯ  в”Ӯ :3000    в”Ӯв—„в”Җв”Ӯ nginx:80 в”Ӯв—„в”Җв”ӮPlaywrightв”Ӯ  в”Ӯ
#   в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
# ============================================================

name: Angular Docker Playwright CI

# DГ©clencheurs : push (toutes branches) et pull requests.
on:
  push:
  pull_request:

jobs:
  test:
    # Environnement d'exГ©cution fourni par GitHub.
    runs-on: ubuntu-latest

    steps:

      # ======================
      # 1. CODE
      # TГ©lГ©charge le code source du dГ©pГҙt sur le runner.
      # actions/checkout@v4 est l'action officielle GitHub.
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ======================
      # 2. START DOCKER STACK
      # Lance les trois services en arriГЁre-plan (-d) :
      # json-server, frontend et tests.
      # --build force la reconstruction des images Г  chaque run.
      # ======================
      - name: Build and start services
        run: docker compose -f docker-compose.ci.yml up --build -d

      # ======================
      # 3. WAIT FRONTEND
      # VГ©rifie que nginx rГ©pond sur le port 4200 (hГҙte).
      # La boucle tente pendant 80 s max (40 Г— 2 s) avant d'Г©chouer
      # et d'afficher les logs Docker pour faciliter le dГ©bogage.
      # ======================
      - name: Wait for frontend
        run: |
          echo "Waiting frontend..."
          for i in {1..40}; do
            curl -s http://localhost:4200 > /dev/null && echo "Frontend ready" && exit 0
            sleep 2
          done
          echo "Frontend failed" && docker compose logs && exit 1

      # ======================
      # 4. WAIT API
      # VГ©rifie que json-server rГ©pond sur le port 3000 (hГҙte).
      # MГӘme logique de retry que pour le frontend.
      # ======================
      - name: Wait for API
        run: |
          echo "Waiting API..."
          for i in {1..40}; do
            curl -s http://localhost:3000 > /dev/null && echo "API ready" && exit 0
            sleep 2
          done
          echo "API failed" && docker compose logs && exit 1

      # ======================
      # 5. RUN TESTS
      # Lance le conteneur "tests" qui exГ©cute run-e2e.sh :
      # installation npm + Playwright + attente frontend + npx playwright test.
      # Le code de sortie du conteneur dГ©termine le succГЁs ou l'Г©chec du job.
      # ======================
      - name: Run Playwright tests
        run: docker compose -f docker-compose.ci.yml run tests

      # ======================
      # 6. CLEANUP
      # ArrГӘte et supprime tous les conteneurs mГӘme en cas d'Г©chec
      # (if: always()) pour libГ©rer les ressources du runner.
      # ======================
      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down
