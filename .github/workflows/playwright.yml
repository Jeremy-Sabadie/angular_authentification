name: Playwright Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Installer dépendances
      - name: Install dependencies
        run: npm install

      # 4. Installer navigateurs Playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5. Lancer JSON Server (API mock)
      - name: Start JSON Server
        run: npx json-server db.json --port 3000 &

      # 6. Lancer Angular (build preview simple)
      - name: Build Angular app
        run: npm run build

      - name: Serve Angular app
        run: npx http-server dist -p 4200 &

      # 7. Attendre démarrage services
      - name: Wait for services
        run: sleep 10

      # 8. Lancer tests Playwright
      - name: Run Playwright tests
        run: npx playwright test

      # 9. Upload report (optionnel mais utile)
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
