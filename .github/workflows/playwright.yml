name: Docker CI Playwright

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # 1. Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker build + start
      - name: Build and start containers
        run: docker compose -f docker-compose.ci.yml up --build -d

      # 3. Attente réelle Angular (IMPORTANT)
      - name: Wait for Angular app
        run: |
          echo "Waiting for frontend..."
          for i in {1..30}; do
            curl -s http://localhost:4200 > /dev/null && echo "Frontend ready" && exit 0
            sleep 2
          done
          echo "Frontend failed to start" && exit 1

      # 4. Logs si erreur (debug)
      - name: Show container logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs

      # 5. Playwright tests dans Docker
      - name: Run Playwright tests
        run: docker compose -f docker-compose.ci.yml run tests

      # 6. Cleanup
      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down
