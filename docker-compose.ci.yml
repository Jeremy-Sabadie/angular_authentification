services:
  json-server:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: npx json-server --watch db.json --host 0.0.0.0 --port 3000 --quiet
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      json-server:
        condition: service_healthy

  tests:
    image: mcr.microsoft.com/playwright:v1.54.1-jammy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - BASE_URL=http://frontend:80
      - CI=true
    depends_on:
      - frontend
    command: sh /app/run-e2e.sh
