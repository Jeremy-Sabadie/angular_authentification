services:
  json-server:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: npx json-server --watch db.json --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - json-server

  tests:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - frontend
    command: sh -c "npm ci && npx playwright install && npx playwright test"
