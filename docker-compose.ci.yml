services:
  json-server:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: npx --yes json-server@0.17.4 --watch db.json --host 0.0.0.0 --port 3000 --quiet
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(0)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      json-server:
        condition: service_healthy

  tests:
    image: mcr.microsoft.com/playwright:v1.54.1-jammy
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - BASE_URL=http://frontend:80
      - CI=true
    depends_on:
      - frontend
    command: sh /app/run-e2e.sh
