<div class="container">

  <!-- HEADER -->
  <div class="topbar">
    <div>
      <h2>Gestion des matériels</h2>
      <p>Ajoutez, modifiez et supprimez les équipements</p>
    </div>

    <span class="topbar-user" data-testid="topbar-user">Bonjour {{ currentUser?.email }}</span>

    <div class="topbar-actions">
      <button class="toggle-btn" (click)="toggleList()">
        {{ showList ? 'Masquer la liste' : 'Afficher la liste' }}
      </button>
      <button class="logout-btn" (click)="logout()">Déconnexion</button>
    </div>
  </div>

  <!-- FORMULAIRE AJOUT -->
  <div class="create-card">

    <div class="card-title">
      <h3>Ajouter un matériel</h3>
      <span>Nouveau matériel</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="submitCreate()">

      <div class="grid">

        <div class="field">
          <label>Numéro de série</label>
          <input type="text" formControlName="serialNumber" data-testid="create-serial-number" placeholder="Ex : SN-2026-001" />
        </div>

        <div class="field">
          <label>Date mise en service</label>
          <input type="date" formControlName="dateMiseEnService" data-testid="create-date-mise-en-service" />
        </div>

        <div class="field">
          <label>Date fin garantie</label>
          <input type="date" formControlName="dateFinGarantie" data-testid="create-date-fin-garantie" />
        </div>

      </div>

      <div class="actions">
        <button type="submit" class="add-btn" data-testid="create-btn" [disabled]="form.invalid">
          Ajouter le matériel
        </button>
      </div>

    </form>
  </div>

  <!-- TABLEAU -->
  <div class="table-card" *ngIf="showList">

    <table data-testid="materials-table">
      <thead>
        <tr>
          <th>Serial</th>
          <th>Mise en service</th>
          <th>Fin garantie</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let m of materiels">
          <td>{{ m.serialNumber }}</td>
          <td>{{ m.dateMiseEnService }}</td>
          <td>{{ m.dateFinGarantie }}</td>

          <td class="btns">
            <button class="edit" data-testid="edit-btn" (click)="openEditModal(m)">Modifier</button>
            <button class="delete" data-testid="delete-btn" (click)="delete(m.id!)">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- MODAL MODIFICATION -->
  <div class="modal" *ngIf="showModal" data-testid="modal">

    <div class="modal-box">

      <h3>Modifier le matériel</h3>

      <form [formGroup]="form" (ngSubmit)="submitEdit()">

        <div class="field">
          <label>Numéro de série</label>
          <input type="text" formControlName="serialNumber" data-testid="modal-serial-number" />
        </div>

        <div class="field">
          <label>Date mise en service</label>
          <input type="date" formControlName="dateMiseEnService" data-testid="modal-date-mise-en-service" />
        </div>

        <div class="field">
          <label>Date fin garantie</label>
          <input type="date" formControlName="dateFinGarantie" data-testid="modal-date-fin-garantie" />
        </div>

        <div class="modal-actions">
          <button type="submit" class="primary" data-testid="modal-save">Enregistrer</button>
          <button type="button" class="cancel" (click)="closeModal()">Annuler</button>
        </div>

      </form>

    </div>

  </div>

</div>
